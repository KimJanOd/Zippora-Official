backend:
  name: github
  repo: KimJanOd/Zippora-Official
  branch: master

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

publish_mode: simple

collections:
  - name: "site"
    label: "Site content"
    files:
      - name: "siteJson"
        label: "Website Content"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Hero background image", name: "bgImage", widget: "image" }

              # This is the ONLY toggle you need:
              - { label: "Platform icons are clickable", name: "platformsClickable", widget: "boolean", default: true }

              # When clickable = ON → required links
              - label: "Platforms (clickable)"
                name: "platforms"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "YouTube link", name: "youtube", widget: "string" }
                  - { label: "Spotify link", name: "spotify", widget: "string" }
                  - { label: "Apple Music link", name: "appleMusic", widget: "string" }
                condition:
                  field: "platformsClickable"
                  value: true

              # When clickable = OFF → optional links (hidden if you want)
              - label: "Platforms (not clickable)"
                name: "platformsDisabled"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "YouTube link (optional)", name: "youtube", widget: "string", required: false }
                  - { label: "Spotify link (optional)", name: "spotify", widget: "string", required: false }
                  - { label: "Apple Music link (optional)", name: "appleMusic", widget: "string", required: false }
                condition:
                  field: "platformsClickable"
                  value: false       

          - label: "Show platform icons"
            name: "platformsEnabled"
            widget: "boolean"
            default: true
            hint: "Turn OFF to hide all platform icons. Turn ON to show icons (links below)."

          - label: "Music"
            name: "music"
            widget: "object"
            fields:
              - label: "Featured video embed URL"
                name: "featuredVideoEmbedUrl"
                widget: "string"
                required: false
                hint: "Optional. Leave empty to hide the featured video."

              - label: "Music cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Cover image", name: "coverImage", widget: "image" }

                  - label: "Status label"
                    name: "statusLabel"
                    widget: "select"
                    options: ["Stream now", "Coming soon"]
                    default: "Stream now"

                  - { label: "Spotify link", name: "spotify", widget: "string" }
                  - { label: "Apple Music link", name: "appleMusic", widget: "string" }
                  - { label: "YouTube link", name: "youtube", widget: "string" }               
     
          - label: "News"
            name: "news"
            widget: "object"
            fields:
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.date}} — {{fields.title}}"
                fields:
                  - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "string" }
                  - { label: "Link URL", name: "linkUrl", widget: "string" }
                  - { label: "Button text", name: "buttonText", widget: "string" }                  

          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "About image", name: "image", widget: "image" }
              - { label: "About text", name: "text", widget: "markdown" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Contact email", name: "emailTo", widget: "string" }
