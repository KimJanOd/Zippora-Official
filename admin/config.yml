backend:
  name: github
  repo: KimJanOd/Zippora-Official
  branch: master

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

publish_mode: simple

collections:
  - name: "site"
    label: "Site content"
    files:
      - name: "siteJson"
        label: "Website Content"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Hero background image", name: "bgImage", widget: "image" }

              - label: "Platform icons clickable"
                name: "platformsClickable"
                widget: "boolean"
                default: false
                hint: "Turn OFF to make icons not clickable, no links needed. Turn ON, Platform links required."

              - label: "Platforms"
                name: "platforms"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "YouTube link", name: "youtube", widget: "string", required: false }
                  - { label: "Spotify link", name: "spotify", widget: "string", required: false }
                  - { label: "Apple Music link", name: "appleMusic", widget: "string", required: false }
                      
          - label: "Music"
            name: "music"
            widget: "object"
            fields:
              - label: "Featured video embed URL"
                name: "featuredVideoEmbedUrl"
                widget: "string"
                required: false
                hint: "Optional. Leave empty to hide the featured video."

              - label: "Music cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Cover image", name: "coverImage", widget: "image" }

                  - label: "Status label"
                    name: "statusLabel"
                    widget: "select"
                    options: ["Stream now", "Coming soon"]
                    default: "Stream now"
                    hint: "Add platform links when using 'Stream now'."

                  - { label: "Spotify link", name: "spotify", widget: "string", required: false }
                  - { label: "Apple Music link", name: "appleMusic", widget: "string", required: false }
                  - { label: "YouTube link", name: "youtube", widget: "string", required: false }              
     
          - label: "News"
            name: "news"
            widget: "object"
            fields:
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.date}} — {{fields.title}}"
                fields:
                  - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "string" }
                  - { label: "Button text", name: "buttonText", widget: "string" } 
                  - { label: "Link URL", name: "linkUrl", widget: "string" }
                                   
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "About image", name: "image", widget: "image" }
              - label: "About text"
                name: "text"
                widget: "text"
                required: false
                hint: "Plain text. Use line breaks to create paragraphs."

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Contact email", name: "emailTo", widget: "string" }
              - label: "Contact intro"
                name: "intro"
                widget: "string"
                required: false
                hint: "Short sentence under 'Get in touch'. Leave empty to use the website fallback text."
